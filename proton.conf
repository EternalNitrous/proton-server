# Proton hexapod robot profile
#
# This file is for robot builders, not C++ developers. Values are loaded at
# startup. Distances ending in _mm are millimetres. Angles ending in _deg are
# degrees. The simulator uses this leg order everywhere:
#
#   R1 front-right, R2 middle-right, R3 rear-right,
#   L1 front-left,  L2 middle-left,  L3 rear-left
#
# Run with:
#   ./proton-server --config proton.conf

# Link lengths: measure between joint rotation axes.
coxa_length_mm = 43
femur_length_mm = 80
tibia_length_mm = 134

# Frame measurements: measure between coxa rotation centers.
l1_to_r1_mm = 111.436
l1_to_l3_mm = 151.719
l2_to_r2_mm = 143

# Coxa offsets are the original neutral coxa joint angles, measured from that
# leg's mount angle. Leg order is:
# R1, R2, R3, L1, L2, L3.
coxa_offsets_deg = 12, 0, -12, -12, 0, 12

# Original simulator footprint design. These values derive the default foot
# positions; standing_height_mm below is the live body height.
footprint_design_knee_angle_deg = 115
footprint_design_height_mm = 120

# Standing setup. standing_height_mm is the default live body height.
standing_height_mm = 56
sitting_height_mm = 20

# App-controlled movement ranges. body_radius_mm is measured from the body
# center to the middle feet. Corner foot distance follows from the coxa offsets.
height_max_mm = 180
body_radius_mm = 252
body_radius_min_mm = 230
body_radius_max_mm = 280
step_height_mm = 80
step_height_min_mm = 20
step_height_max_mm = 120
speed_min_mps = 0.06
speed_max_mps = 0.225

# Servo calibration. servo_type_deg is the total mechanical angle for one
# servo. This codebase defaults to 270 degree servos, but other ranges can be
# tested here if your hardware differs.
servo_type_deg = 270
servo_pwm_min_us = 500
servo_pwm_neutral_us = 1500
servo_pwm_max_us = 2500
servo_center_coxa_deg = 135
servo_center_femur_deg = 100
servo_center_tibia_deg = 225

# Conservative solver safety limits. Change these only after the link lengths
# and servo centers are correct.
safe_coxa_limit_deg = 72
safe_tibia_folded_deg = -140
safe_tibia_extended_deg = -15
femur_min_deg = -85
femur_max_deg = 85

# Servo2040 pin map. Format:
#   servo2040.pinN = LEG.joint, normal
#   servo2040.pinN = LEG.joint, reversed
#
# Reversed means the hardware PWM is flipped around servo_pwm_neutral_us.
servo2040.pin0 = R3.coxa, reversed
servo2040.pin1 = R3.femur, normal
servo2040.pin2 = R3.tibia, reversed
servo2040.pin3 = L3.coxa, reversed
servo2040.pin4 = L3.femur, reversed
servo2040.pin5 = L3.tibia, normal
servo2040.pin6 = R2.coxa, reversed
servo2040.pin7 = R2.femur, normal
servo2040.pin8 = R2.tibia, reversed
servo2040.pin9 = L2.coxa, reversed
servo2040.pin10 = L2.femur, reversed
servo2040.pin11 = L2.tibia, normal
servo2040.pin12 = R1.coxa, reversed
servo2040.pin13 = R1.femur, normal
servo2040.pin14 = R1.tibia, reversed
servo2040.pin15 = L1.coxa, reversed
servo2040.pin16 = L1.femur, reversed
servo2040.pin17 = L1.tibia, normal

# Basic walking speeds. These are safe defaults; tune after calibration.
walk_speed_mps = 0.15
strafe_speed_mps = 0.15
spin_rate_radps = 1.0
height_rate_mps = 0.06
